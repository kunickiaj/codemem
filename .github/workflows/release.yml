name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  preflight-tag:
    name: Release Tag Preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag points at merged main HEAD
        env:
          RELEASE_TAG_COMMIT: ${{ github.sha }}
        run: bash scripts/release-tag-preflight.sh

  ci:
    name: CI
    needs: preflight-tag
    uses: ./.github/workflows/ci.yml

  publish-npm:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy viewer static assets
        run: |
          mkdir -p packages/viewer-server/static
          cp codemem/viewer_static/index.html codemem/viewer_static/favicon.svg packages/viewer-server/static/

      - name: Build
        run: pnpm run build

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *"-alpha"* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *"-beta"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *"-rc"* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ""
        run: |
          DIST_TAG="${{ steps.dist-tag.outputs.tag }}"
          # pnpm publish resolves workspace:^ to actual version ranges.
          # Publish in dependency order: core → mcp, server → cli
          pnpm --filter @codemem/core publish --tag "$DIST_TAG" --provenance --access public --no-git-checks
          pnpm --filter @codemem/mcp publish --tag "$DIST_TAG" --provenance --access public --no-git-checks
          pnpm --filter @codemem/server publish --tag "$DIST_TAG" --provenance --access public --no-git-checks
          pnpm --filter codemem publish --tag "$DIST_TAG" --provenance --access public --no-git-checks

  release:
    name: Create GitHub Release
    needs: [ci, publish-npm]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ github.ref_name }}" == *"-alpha"* ]] || \
             [[ "${{ github.ref_name }}" == *"-beta"* ]] || \
             [[ "${{ github.ref_name }}" == *"-rc"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release already exists"
          else
            gh release create "${{ github.ref_name }}" \
              --generate-notes \
              --title "Release ${{ github.ref_name }}" \
              $PRERELEASE_FLAG
          fi

  bump-version:
    name: Bump to next unreleased version
    needs: [publish-npm, release]
    runs-on: ubuntu-latest
    if: contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Compute next version
        id: next
        run: |
          # Extract current prerelease: v0.20.0-alpha.4 → 0.20.0-alpha.4
          RELEASED="${GITHUB_REF_NAME#v}"
          # Increment the trailing number: alpha.4 → alpha.5
          BASE="${RELEASED%-*}"
          PRERELEASE="${RELEASED##*-}"
          CHANNEL="${PRERELEASE%%.*}"
          NUM="${PRERELEASE##*.}"
          NEXT_NUM=$((NUM + 1))
          NEXT="${BASE}-${CHANNEL}.${NEXT_NUM}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping to $NEXT"

      - name: Guard against overwriting a newer main train
        id: guard
        run: |
          RELEASED="${GITHUB_REF_NAME#v}"
          CURRENT_MAIN=$(node -p "require('./packages/core/package.json').version")
          echo "released=$RELEASED" >> "$GITHUB_OUTPUT"
          echo "current_main=$CURRENT_MAIN" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT_MAIN" != "$RELEASED" ]; then
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            echo "Skipping auto-bump: main is already at $CURRENT_MAIN, tag released $RELEASED"
          else
            echo "should_bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: steps.guard.outputs.should_bump == 'true'
        run: |
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh "${{ steps.next.outputs.version }}"
          pnpm install --no-frozen-lockfile

      - name: Commit and push
        if: steps.guard.outputs.should_bump == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to ${{ steps.next.outputs.version }} [skip ci]"
          git push origin main
