name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish-npm:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *"-alpha"* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *"-beta"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *"-rc"* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ""
        run: |
          DIST_TAG="${{ steps.dist-tag.outputs.tag }}"
          # Publish in dependency order: core → mcp, server → cli
          npm publish ./packages/core --tag "$DIST_TAG" --provenance --access public
          npm publish ./packages/mcp-server --tag "$DIST_TAG" --provenance --access public
          npm publish ./packages/viewer-server --tag "$DIST_TAG" --provenance --access public
          npm publish ./packages/cli --tag "$DIST_TAG" --provenance --access public

  release:
    name: Create GitHub Release
    needs: [ci, publish-npm]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ github.ref_name }}" == *"-alpha"* ]] || \
             [[ "${{ github.ref_name }}" == *"-beta"* ]] || \
             [[ "${{ github.ref_name }}" == *"-rc"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release already exists"
          else
            gh release create "${{ github.ref_name }}" \
              --generate-notes \
              --title "Release ${{ github.ref_name }}" \
              $PRERELEASE_FLAG
          fi
