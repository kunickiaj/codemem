name: CI

on:
  push:
    branches: [main]
  pull_request:

  workflow_call:

jobs:
  tsc:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript project reference check
        run: pnpm run tsc

  ts-test:
    name: TypeScript Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy viewer static assets
        run: |
          mkdir -p packages/viewer-server/static
          cp codemem/viewer_static/index.html codemem/viewer_static/favicon.svg packages/viewer-server/static/

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  worker-test:
    name: Cloudflare Worker Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Worker integration test
        run: pnpm --filter @codemem/cloudflare-coordinator-worker test:worker

  ts-lint:
    name: TypeScript Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm run lint

  plugin-smoke:
    name: Plugin Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install plugin runtime dependency
        run: |
          npm install --prefix packages/cli/.opencode --no-save @opencode-ai/plugin@1.2.27
          npm install --prefix packages/opencode-plugin/.opencode --no-save @opencode-ai/plugin@1.2.27

      - name: Run plugin unit tests
        run: pnpm --filter codemem test:plugin && pnpm --filter codemem test:smoke

  packaged-plugin-smoke:
    name: Packaged Plugin Smoke Test
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy viewer static assets
        run: |
          mkdir -p packages/viewer-server/static
          cp codemem/viewer_static/index.html codemem/viewer_static/favicon.svg packages/viewer-server/static/

      - name: Build
        run: pnpm run build

      - name: Run packed artifact smoke test
        run: pnpm --filter @codemem/opencode-plugin test:packed-artifact

  e2e-smoke:
    name: E2E Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run E2E smoke scenario
        env:
          CODEMEM_E2E_BUILD: "1"
          CODEMEM_E2E_ARTIFACTS_DIR: .tmp/e2e-artifacts
          CODEMEM_E2E_JSON: "1"
        run: pnpm run e2e:smoke -- --json

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts
          path: .tmp/e2e-artifacts
          if-no-files-found: ignore
