name: CI

on:
  push:
    branches: [main]
  pull_request:

  workflow_call:

jobs:
  ts-test:
    name: TypeScript Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy viewer static assets
        run: |
          mkdir -p packages/viewer-server/static
          cp codemem/viewer_static/index.html codemem/viewer_static/favicon.svg packages/viewer-server/static/

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  ts-lint:
    name: TypeScript Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm run lint

  plugin-smoke:
    name: Plugin Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install plugin runtime dependency
        run: npm install --prefix packages/cli/.opencode --no-save @opencode-ai/plugin@1.2.27

      - name: Run plugin unit tests
        run: pnpm --filter codemem test:plugin && pnpm --filter codemem test:smoke

  packaged-plugin-smoke:
    name: Packaged Plugin Smoke Test
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy viewer static assets
        run: |
          mkdir -p packages/viewer-server/static
          cp codemem/viewer_static/index.html codemem/viewer_static/favicon.svg packages/viewer-server/static/

      - name: Build
        run: pnpm run build

      - name: Run packed artifact smoke test
        run: pnpm --filter codemem test:packed-artifact
